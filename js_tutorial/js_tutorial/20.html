<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //Assignment : create an array of numbers(Integer) find max and min element in array
        //by array literal
        //by creating instance of array directly--> using new keyword
       
        var emp=["user1","user2","user3"];//length 3 , index=0,1,2
        for(var i=0;i<emp.length;i++){
         document.write(emp[i]+"<br/>");
        }
         //by creating instance of array directly--> using new keyword
         var emp2=new Array();
         emp2[0]="Arun";
         emp2[1]="varun";
         emp2[2]="john";
         for(var i=0;i<emp2.length;i++){
         document.write(emp2[i]+"<br/>");
        }
         //by using an array constructor
         var emp3=new Array("jai","vijay","smith");
         for(var i=0;i<emp3.length;i++){
         document.write(emp3[i]+"<br/>");
        }
        </script>
</body>
</html>
